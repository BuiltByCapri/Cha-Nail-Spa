<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cha Nails & Spa · Houston</title>
  <style>
    :root {
      --brand:   #b76e79;
      --brand-d: #9a5a64;
      --bg:      #fdf6f7;
      --card:    #ffffff;
      --text:    #2d2d2d;
      --muted:   #888;
      --border:  #e8d5d8;
      --radius:  14px;
      --shadow:  0 4px 24px rgba(183,110,121,.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: var(--brand);
      color: #fff;
      text-align: center;
      padding: 28px 20px 22px;
    }
    header .brand { font-size: 2rem; font-weight: 700; letter-spacing: .5px; }
    header .brand span { font-weight: 300; }
    header address {
      font-style: normal;
      font-size: .85rem;
      opacity: .88;
      margin-top: 6px;
      line-height: 1.6;
    }
    header address a { color: #fff; text-decoration: none; }

    /* ── main card ── */
    main {
      max-width: 560px;
      margin: 32px auto 48px;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── form elements ── */
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .97rem;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      margin-bottom: 18px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--brand);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── service checkboxes ── */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .svc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-size: .9rem;
    }
    .svc-item:hover { border-color: var(--brand); background: #fdf0f2; }
    .svc-item input[type=checkbox] {
      width: 16px; height: 16px;
      margin: 0; padding: 0;
      accent-color: var(--brand);
    }
    .svc-item.checked { border-color: var(--brand); background: #fdf0f2; }

    /* ── time slots ── */
    .slots-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .slot-btn {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: .88rem;
      cursor: pointer;
      transition: all .2s;
    }
    .slot-btn:hover { border-color: var(--brand); color: var(--brand); }
    .slot-btn.selected {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 600;
    }
    .slot-btn.taken {
      opacity: .38;
      cursor: not-allowed;
      text-decoration: line-through;
    }
    #slots-msg { font-size: .85rem; color: var(--muted); margin-bottom: 12px; }

    /* ── add-person section ── */
    #add-person-section { margin-bottom: 18px; }
    .person-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .person-row input { margin-bottom: 0; }
    .remove-person {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    .remove-person:hover { color: #c0392b; }
    .add-person-btn {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      color: var(--brand);
      font-size: .88rem;
      padding: 8px 14px;
      cursor: pointer;
      width: 100%;
      transition: border-color .2s;
    }
    .add-person-btn:hover { border-color: var(--brand); }

    /* ── appt blocks ── */
    .appt-block {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fffcfd;
    }
    .appt-block-header {
      font-weight: 700;
      font-size: .95rem;
      color: var(--brand);
      margin-bottom: 14px;
    }

    /* ── buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-d); }
    .btn-secondary {
      background: #f5e8ea;
      color: var(--brand);
      margin-top: 10px;
    }
    .btn-secondary:hover { background: #ecd4d7; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ── steps ── */
    #step1, #step2, #step3 { display: none; }
    #step1.active, #step2.active, #step3.active { display: block; }

    /* ── messages ── */
    #msg {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 16px;
      display: none;
    }
    #msg.error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
    #msg.success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
    #msg.info { background: #eaf4fb; color: #1a5276; border: 1px solid #aed6f1; }

    /* ── confirmation ── */
    .confirm-box {
      background: #eafaf1;
      border: 1.5px solid #a9dfbf;
      border-radius: 10px;
      padding: 22px;
      text-align: center;
    }
    .confirm-box h2 { color: #1e8449; margin-bottom: 8px; }
    .confirm-box p { color: #2d6a4f; font-size: .93rem; line-height: 1.6; }
    .confirm-detail {
      background: #fff;
      border-radius: 8px;
      padding: 14px;
      margin: 14px 0;
      text-align: left;
      font-size: .9rem;
      line-height: 1.8;
      border: 1px solid #d5f0e0;
    }

    /* ── points badge ── */
    .points-badge {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      font-size: .78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* ── footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      padding: 24px 16px;
    }

    /* ── spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 22px 16px; }
      .row2 { grid-template-columns: 1fr; gap: 0; }
      .services-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Cha<span> Nails &amp; Spa</span></div>
  <address>
    4210 San Felipe · Houston, TX 77027<br>
    <a href="tel:+17136226245">(713) 622-6245</a>
  </address>
</header>

<main>
  <div class="card">
    <div class="card-title">Book an Appointment</div>
    <div class="card-sub">Cha Nails &amp; Spa · Houston</div>

    <div id="msg"></div>

    <!-- ── Step 1: Phone lookup ── -->
    <div id="step1" class="active">
      <label for="phone1">Your Phone Number</label>
      <input type="tel" id="phone1" placeholder="(713) 555-0000" maxlength="14" />

      <div id="add-person-section">
        <!-- extra person phone rows injected here -->
      </div>
      <button class="add-person-btn" id="add-person-btn" type="button">+ Add another person</button>

      <button class="btn btn-primary" id="btn-lookup" onclick="proceedToBooking()">
        Continue
      </button>
    </div>

    <!-- ── Step 2: Appointment blocks ── -->
    <div id="step2">
      <div id="appt-blocks-container"></div>
      <button class="btn btn-primary" id="btn-book" onclick="submitAll()">
        Confirm Booking
      </button>
      <button class="btn btn-secondary" onclick="cancelBooking()">Cancel</button>
    </div>

    <!-- ── Step 3: Confirmation ── -->
    <div id="step3">
      <div class="confirm-box">
        <h2>You&#39;re Booked! ✓</h2>
        <p>We look forward to seeing you.</p>
        <div class="confirm-detail" id="confirm-detail"></div>
        <p style="font-size:.82rem;color:var(--muted)">A confirmation has been sent to your email/phone if provided.</p>
      </div>
      <button class="btn btn-secondary" onclick="cancelBooking()" style="margin-top:18px">Book Another</button>
    </div>

  </div><!-- /.card -->
</main>

<footer>© 2026 Cha Nails &amp; Spa · Houston, TX</footer>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbweEpavxdcWNjpg_1hUC2xsq-rSaSDkg5eTykTZiT1QEyZ3_equDZSGfVR6oc8Ob7lQ/exec';

const SERVICES = [
  { name: 'Manicure',         duration: 30  },
  { name: 'Pedicure',         duration: 45  },
  { name: 'Gel Manicure',     duration: 45  },
  { name: 'Gel Pedicure',     duration: 60  },
  { name: 'Acrylic Full Set', duration: 75  },
  { name: 'Acrylic Fill',     duration: 60  },
  { name: 'Nail Art',         duration: 30  },
  { name: 'Waxing',           duration: 30  },
];

const TECHS = ['Any Tech', 'Bae', 'Hannah', 'Jessica', 'Kim'];

const TIME_SLOTS = [
  '9:00 AM','9:15 AM','9:30 AM','9:45 AM',
  '10:00 AM','10:15 AM','10:30 AM','10:45 AM',
  '11:00 AM','11:15 AM','11:30 AM','11:45 AM',
  '12:00 PM','12:15 PM','12:30 PM','12:45 PM',
  '1:00 PM','1:15 PM','1:30 PM','1:45 PM',
  '2:00 PM','2:15 PM','2:30 PM','2:45 PM',
  '3:00 PM','3:15 PM','3:30 PM','3:45 PM',
  '4:00 PM','4:15 PM','4:30 PM','4:45 PM',
  '5:00 PM','5:15 PM','5:30 PM','5:45 PM',
  '6:00 PM'
];

const FREE_PEDICURE_PTS = 125;

// ── persons array ──
const persons = [];  // { phone, firstName, lastName }
let extraPersonCount = 0;

function formatPhone(val) {
  const d = val.replace(/\D/g,'');
  if (d.length <= 3) return d;
  if (d.length <= 6) return '(' + d.slice(0,3) + ') ' + d.slice(3);
  return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6,10);
}

document.getElementById('phone1').addEventListener('input', function() {
  this.value = formatPhone(this.value);
});

document.getElementById('add-person-btn').addEventListener('click', function() {
  extraPersonCount++;
  const idx = extraPersonCount;
  const section = document.getElementById('add-person-section');
  const row = document.createElement('div');
  row.className = 'person-row';
  row.id = 'extra-row-' + idx;
  row.innerHTML =
    '<input type="tel" id="phone-extra-' + idx + '" placeholder="(713) 555-0000" maxlength="14" />' +
    '<button class="remove-person" type="button" onclick="removePersonRow(' + idx + ')">✕</button>';
  section.appendChild(row);
  const inp = document.getElementById('phone-extra-' + idx);
  inp.addEventListener('input', function() { this.value = formatPhone(this.value); });
});

function removePersonRow(idx) {
  const row = document.getElementById('extra-row-' + idx);
  if (row) row.remove();
}

async function proceedToBooking() {
  const phones = [];
  const p1 = document.getElementById('phone1').value.trim();
  if (!p1) { showMsg('Please enter your phone number.', 'error'); return; }
  phones.push(p1);

  // collect extra phones
  const extras = document.querySelectorAll('[id^="phone-extra-"]');
  for (const inp of extras) {
    const v = inp.value.trim();
    if (v) phones.push(v);
  }

  showMsg('Looking up your info…', 'info');
  const btn = document.getElementById('btn-lookup');
  btn.disabled = true;

  const lookups = await Promise.all(phones.map(async ph => {
    try {
      const r = await fetch(SCRIPT_URL + '?action=lookup&phone=' + encodeURIComponent(ph));
      const d = await r.json();
      return { phone: ph, firstName: d.firstName || '', lastName: d.lastName || '' };
    } catch(e) {
      return { phone: ph, firstName: '', lastName: '' };
    }
  }));

  persons.length = 0;
  lookups.forEach(function(l) { persons.push(l); });

  hideMsg();
  btn.disabled = false;
  buildApptBlocks();
  showStep('step2');
}

function buildApptBlocks() {
  const container = document.getElementById('appt-blocks-container');
  container.innerHTML = '';
  persons.forEach(function(p, i) {
    container.appendChild(buildApptBlock(p, i));
  });
}

function buildApptBlock(person, idx) {
  const block = document.createElement('div');
  block.className = 'appt-block';
  block.id = 'appt-block-' + idx;

  const label = persons.length > 1 ? 'Person ' + (idx + 1) : 'Your Appointment';

  block.innerHTML =
    '<div class="appt-block-header">' + escHtml(label) + '</div>' +

    '<label>First Name</label>' +
    '<input type="text" id="fn-' + idx + '" value="' + escHtml(person.firstName) + '" placeholder="First name" />' +

    '<label>Last Name</label>' +
    '<input type="text" id="ln-' + idx + '" value="' + escHtml(person.lastName) + '" placeholder="Last name" />' +

    '<label>Email (optional)</label>' +
    '<input type="email" id="email-' + idx + '" placeholder="you@example.com" />' +

    '<label>Date</label>' +
    '<input type="date" id="date-' + idx + '" min="' + todayStr() + '" />' +

    '<label>Technician</label>' +
    '<select id="tech-' + idx + '">' +
      TECHS.map(function(t) { return '<option>' + t + '</option>'; }).join('') +
    '</select>' +

    '<label>Services</label>' +
    '<div class="services-grid" id="svc-grid-' + idx + '">' +
      SERVICES.map(function(s) {
        return '<label class="svc-item" id="svc-' + idx + '-' + s.name.replace(/\s+/g,'-') + '">' +
          '<input type="checkbox" value="' + escHtml(s.name) + '" onchange="updateSvcItem(this)" />' +
          escHtml(s.name) + ' <span style="color:var(--muted);font-size:.8rem">(' + s.duration + 'm)</span>' +
          '</label>';
      }).join('') +
    '</div>' +

    '<label>Available Times</label>' +
    '<div id="slots-msg-' + idx + '" class="slots-msg" style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Select a date, technician, and services first.</div>' +
    '<div class="slots-wrap" id="slots-' + idx + '"></div>';

  // wire up date/tech/svc change → refresh slots
  setTimeout(function() {
    document.getElementById('date-' + idx).addEventListener('change', function() { loadSlots(idx); });
    document.getElementById('tech-' + idx).addEventListener('change', function() { loadSlots(idx); });
  }, 0);

  return block;
}

function updateSvcItem(cb) {
  const label = cb.closest('label');
  if (cb.checked) label.classList.add('checked');
  else label.classList.remove('checked');
  // find block idx
  const block = cb.closest('.appt-block');
  const idx = parseInt(block.id.replace('appt-block-',''));
  loadSlots(idx);
}

async function loadSlots(idx) {
  const dateEl  = document.getElementById('date-' + idx);
  const techEl  = document.getElementById('tech-' + idx);
  const svcGrid = document.getElementById('svc-grid-' + idx);
  const slotsEl = document.getElementById('slots-' + idx);
  const msgEl   = document.getElementById('slots-msg-' + idx);

  const date = dateEl.value;
  const tech = techEl.value;
  const checked = Array.from(svcGrid.querySelectorAll('input[type=checkbox]:checked')).map(function(c) { return c.value; });

  if (!date || checked.length === 0) {
    msgEl.textContent = 'Select a date, technician, and at least one service.';
    slotsEl.innerHTML = '';
    return;
  }

  msgEl.textContent = 'Loading…';
  slotsEl.innerHTML = '';

  try {
    const url = SCRIPT_URL + '?action=availability&date=' + encodeURIComponent(date) +
      '&technician=' + encodeURIComponent(tech) +
      '&services=' + encodeURIComponent(checked.join(','));
    const res = await fetch(url);
    const data = await res.json();

    if (!data.slots) { msgEl.textContent = 'Could not load times.'; return; }
    msgEl.textContent = '';

    data.slots.forEach(function(slot) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'slot-btn' + (slot.available ? '' : ' taken');
      btn.textContent = slot.time;
      btn.disabled = !slot.available;
      btn.addEventListener('click', function() {
        slotsEl.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
      });
      slotsEl.appendChild(btn);
    });
  } catch(e) {
    msgEl.textContent = 'Error loading times.';
  }
}

async function submitAll() {
  const btn = document.getElementById('btn-book');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Booking…';
  hideMsg();

  const results = [];
  let allOk = true;

  for (let i = 0; i < persons.length; i++) {
    const fn    = document.getElementById('fn-' + i).value.trim();
    const ln    = document.getElementById('ln-' + i).value.trim();
    const email = document.getElementById('email-' + i).value.trim();
    const date  = document.getElementById('date-' + i).value;
    const tech  = document.getElementById('tech-' + i).value;
    const svcGrid = document.getElementById('svc-grid-' + i);
    const services = Array.from(svcGrid.querySelectorAll('input[type=checkbox]:checked')).map(function(c) { return c.value; });
    const slotsEl = document.getElementById('slots-' + i);
    const selSlot = slotsEl.querySelector('.slot-btn.selected');

    if (!fn || !date || services.length === 0 || !selSlot) {
      showMsg('Please complete all fields for ' + (persons.length > 1 ? 'person ' + (i+1) : 'your appointment') + '.', 'error');
      btn.disabled = false;
      btn.textContent = 'Confirm Booking';
      return;
    }

    const payload = {
      phone:     persons[i].phone,
      firstName: fn,
      lastName:  ln,
      email:     email,
      date:      date,
      technician: tech,
      services:  services.join(','),
      time:      selSlot.textContent,
      multiPerson: persons.length > 1 ? 'true' : 'false'
    };

    try {
      const res = await fetch(SCRIPT_URL + '?action=book&' + new URLSearchParams(payload));
      const data = await res.json();
      results.push({ person: fn, data });
      if (!data.success) { allOk = false; }
    } catch(e) {
      results.push({ person: fn, data: { success: false, error: 'Network error' } });
      allOk = false;
    }
  }

  btn.disabled = false;
  btn.textContent = 'Confirm Booking';

  // check for partial conflict
  const conflict = results.find(function(r) { return r.data.partialConflict; });
  if (conflict) {
    showMsg(conflict.data.error, 'error');
    return;
  }

  const failed = results.filter(function(r) { return !r.data.success; });
  if (failed.length > 0) {
    showMsg(failed.map(function(r) { return r.person + ': ' + r.data.error; }).join(' | '), 'error');
    return;
  }

  // success
  let html = '';
  results.forEach(function(r) {
    const d = r.data;
    html += '<strong>' + escHtml(r.person) + '</strong><br>' +
      (d.date       ? 'Date: ' + d.date + '<br>' : '') +
      (d.time       ? 'Time: ' + d.time + '<br>' : '') +
      (d.technician ? 'Technician: ' + escHtml(d.technician) + '<br>' : '') +
      (d.services   ? 'Services: ' + escHtml(d.services) + '<br>' : '') +
      '<br>';
  });

  const pts = results[0].data.pointsPreview || 0;
  if (pts) html += '<span class="points-badge">+' + pts + ' pts earned at check-in</span>';

  document.getElementById('confirm-detail').innerHTML = html;
  showStep('step3');
}

function cancelBooking() {
  window.location.href = 'index.html';
}

// ── helpers ──
function showStep(id) {
  ['step1','step2','step3'].forEach(function(s) {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}
function hideMsg() {
  const el = document.getElementById('msg');
  el.style.display = 'none';
}

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
