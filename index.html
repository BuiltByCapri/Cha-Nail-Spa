<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cha Nails & Spa · Houston</title>
  <style>
    :root {
      --brand:   #b76e79;
      --brand-d: #9a5a64;
      --bg:      #fdf6f7;
      --card:    #ffffff;
      --text:    #2d2d2d;
      --muted:   #888;
      --border:  #e8d5d8;
      --radius:  14px;
      --shadow:  0 4px 24px rgba(183,110,121,.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: var(--brand);
      color: #fff;
      text-align: center;
      padding: 28px 20px 22px;
    }
    header .brand { font-size: 2rem; font-weight: 700; letter-spacing: .5px; }
    header .brand span { font-weight: 300; }
    header address {
      font-style: normal;
      font-size: .85rem;
      opacity: .88;
      margin-top: 6px;
      line-height: 1.6;
    }
    header address a { color: #fff; text-decoration: none; }

    /* ── main ── */
    main {
      max-width: 480px;
      margin: 36px auto 48px;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── form ── */
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1.05rem;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: var(--brand); }

    /* ── buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-d); }
    .btn-outline {
      background: #fff;
      color: var(--brand);
      border: 1.5px solid var(--brand);
      margin-top: 12px;
    }
    .btn-outline:hover { background: #fdf0f2; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ── divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── messages ── */
    #msg {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 16px;
      display: none;
    }
    #msg.error   { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
    #msg.success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
    #msg.info    { background: #eaf4fb; color: #1a5276; border: 1px solid #aed6f1; }

    /* ── result card ── */
    #result-section { display: none; }
    .result-box {
      background: #eafaf1;
      border: 1.5px solid #a9dfbf;
      border-radius: 10px;
      padding: 22px;
      text-align: center;
    }
    .result-box h2 { color: #1e8449; margin-bottom: 8px; }
    .result-box p  { color: #2d6a4f; font-size: .93rem; line-height: 1.6; }
    .result-detail {
      background: #fff;
      border-radius: 8px;
      padding: 14px;
      margin: 14px 0;
      text-align: left;
      font-size: .9rem;
      line-height: 1.9;
      border: 1px solid #d5f0e0;
    }
    .points-badge {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .points-total {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      padding: 24px 16px;
    }

    @media (max-width: 480px) {
      .card { padding: 22px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Cha<span> Nails &amp; Spa</span></div>
  <address>
    4210 San Felipe · Houston, TX 77027<br>
    <a href="tel:+17136226245">(713) 622-6245</a>
  </address>
</header>

<main>
  <div class="card">
    <div class="card-title">Welcome!</div>
    <div class="card-sub">Check in or book a new appointment below.</div>

    <div id="msg"></div>

    <!-- check-in section -->
    <div id="checkin-section">
      <label for="checkin-phone">Your Phone Number</label>
      <input type="tel" id="checkin-phone" placeholder="(713) 555-0000" maxlength="14" />

      <button class="btn btn-primary" id="btn-checkin" onclick="doCheckIn()">
        Check In
      </button>
    </div>

    <!-- result section -->
    <div id="result-section">
      <div class="result-box">
        <h2>Checked In! &#10003;</h2>
        <p>Thanks for visiting Cha Nails &amp; Spa.</p>
        <div class="result-detail" id="result-detail"></div>
        <p style="font-size:.82rem;color:var(--muted)">Rewards points have been added to your account.</p>
      </div>
      <button class="btn btn-outline" onclick="resetCheckin()" style="margin-top:18px">Done</button>
    </div>

    <div class="divider">or</div>

    <a href="booking.html" class="btn btn-outline" style="text-align:center;text-decoration:none;display:block">
      Book an Appointment
    </a>
  </div><!-- /.card -->
</main>

<footer>&copy; 2026 Cha Nails &amp; Spa &middot; Houston, TX</footer>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbweEpavxdcWNjpg_1hUC2xsq-rSaSDkg5eTykTZiT1QEyZ3_equDZSGfVR6oc8Ob7lQ/exec';

function formatPhone(val) {
  const d = val.replace(/\D/g,'');
  if (d.length <= 3) return d;
  if (d.length <= 6) return '(' + d.slice(0,3) + ') ' + d.slice(3);
  return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6,10);
}

document.getElementById('checkin-phone').addEventListener('input', function() {
  this.value = formatPhone(this.value);
});

document.getElementById('checkin-phone').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doCheckIn();
});

async function doCheckIn() {
  const phone = document.getElementById('checkin-phone').value.trim();
  if (!phone) { showMsg('Please enter your phone number.', 'error'); return; }

  const btn = document.getElementById('btn-checkin');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Checking in\u2026';
  hideMsg();

  try {
    const res = await fetch(SCRIPT_URL + '?action=checkin&phone=' + encodeURIComponent(phone));
    const data = await res.json();

    if (!data.success) {
      showMsg(data.error || 'No appointment found for today. Please check your phone number.', 'error');
      btn.disabled = false;
      btn.textContent = 'Check In';
      return;
    }

    let html = '';
    if (data.firstName) html += '<strong>' + escHtml(data.firstName + (data.lastName ? ' ' + data.lastName : '')) + '</strong><br>';
    if (data.date)       html += 'Date: '        + escHtml(data.date)       + '<br>';
    if (data.time)       html += 'Time: '        + escHtml(data.time)       + '<br>';
    if (data.technician) html += 'Technician: '  + escHtml(data.technician) + '<br>';
    if (data.services)   html += 'Services: '    + escHtml(data.services)   + '<br>';
    if (data.pointsEarned) {
      html += '<br><span class="points-badge">+' + data.pointsEarned + ' pts earned</span>';
    }
    if (data.totalPoints !== undefined) {
      html += '<div class="points-total">Total points: ' + data.totalPoints + '</div>';
    }

    document.getElementById('result-detail').innerHTML = html;
    document.getElementById('checkin-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';

  } catch(e) {
    showMsg('Network error. Please try again.', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Check In';
}

function resetCheckin() {
  document.getElementById('checkin-phone').value = '';
  document.getElementById('result-detail').innerHTML = '';
  document.getElementById('checkin-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
